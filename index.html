<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Startup Simulator</title>
<style>
  @font-face {
    font-family: 'PeaBerry Mono';
    src: url('https://wksebvnsnijzxeusqmuf.supabase.co/storage/v1/object/public/fonts/PeaberryMono.ttf') format('truetype');
  }
  body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #1e1e24;
    font-family: 'PeaBerry Mono', monospace;
    color: #fff;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  #game-container {
    position: relative;
    width: 100%;
    height: 100%;
  }
  canvas {
    display: block;
    position: absolute;
    top: 0;
    left: 0;
    z-index: 1;
    cursor: pointer;
  }
  #ui-layer {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 10;
    display: flex;
  }
  #hud {
    position: absolute;
    top: 20px;
    left: 20px;
    right: 360px;
    display: none;
    flex-direction: row;
    flex-wrap: wrap;
    gap: 15px;
    z-index: 10;
  }
  #marketing-container {
    position: absolute;
    bottom: 20px;
    left: 20px;
    right: 360px;
    display: none;
    flex-direction: row;
    justify-content: center;
    gap: 15px;
    z-index: 10;
  }
  .hud-box {
    background: #2b2b36;
    border: 3px solid #4a4a5a;
    border-radius: 8px;
    padding: 12px 15px;
    box-shadow: 0 6px 0 rgba(0,0,0,0.5);
    flex: 1;
    min-width: 180px;
    word-break: break-word;
  }
  .hud-title {
    font-size: 14px;
    color: #aaa;
    margin-bottom: 5px;
    text-transform: uppercase;
  }
  .hud-value {
    font-size: 24px;
    color: #44ff44;
    text-shadow: 2px 2px 0 #005500;
  }
  #shop-panel {
    position: absolute;
    right: 0;
    top: 0;
    width: 340px;
    height: 100%;
    background: #2b2b36;
    border-left: 4px solid #1a1a24;
    pointer-events: auto;
    display: none;
    flex-direction: column;
    box-shadow: -5px 0 15px rgba(0,0,0,0.5);
    z-index: 10;
  }
  #shop-header {
    background: #1a1a24;
    padding: 20px;
    text-align: center;
    font-size: 22px;
    color: #ffcc00;
    border-bottom: 4px solid #4a4a5a;
    text-shadow: 2px 2px 0 #aa4400;
  }
  #shop-items {
    flex: 1;
    overflow-y: auto;
    padding: 15px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  /* Custom Scrollbar */
  #shop-items::-webkit-scrollbar { width: 8px; }
  #shop-items::-webkit-scrollbar-track { background: #1a1a24; }
  #shop-items::-webkit-scrollbar-thumb { background: #4a4a5a; border-radius: 4px; }
  
  .shop-btn {
    background: #3f3f4e;
    border: 3px solid #5a5a6a;
    border-radius: 8px;
    padding: 12px;
    cursor: pointer;
    color: white;
    text-align: left;
    font-family: inherit;
    display: flex;
    flex-direction: column;
    gap: 6px;
    box-shadow: 0 4px 0 #1a1a24;
    transition: transform 0.1s, border-color 0.1s;
  }
  .shop-btn:hover:not(:disabled) {
    border-color: #888899;
    transform: translateY(2px);
    box-shadow: 0 2px 0 #1a1a24;
  }
  .shop-btn:active:not(:disabled) {
    transform: translateY(4px);
    box-shadow: none;
  }
  .shop-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    filter: grayscale(100%);
  }
  .item-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .item-name {
    font-size: 16px;
    color: #fff;
    font-weight: bold;
  }
  .item-count {
    font-size: 14px;
    background: #1a1a24;
    padding: 3px 8px;
    border-radius: 12px;
    color: #ffcc00;
  }
  .item-desc {
    font-size: 12px;
    color: #aaa;
  }
  .item-cost {
    font-size: 14px;
    color: #44ff44;
    margin-top: 4px;
  }
  .cost-val.too-expensive { color: #ff4444; }
  
  #screens {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(20, 20, 25, 0.9);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 20;
  }
  .title {
    font-size: 72px;
    color: #44ff44;
    text-shadow: 6px 6px 0 #005500;
    margin-bottom: 10px;
    text-align: center;
  }
  .subtitle {
    font-size: 20px;
    color: #aaa;
    margin-bottom: 40px;
  }
  .play-btn {
    background: #ffcc00;
    border: 4px solid #fff;
    color: #111;
    padding: 15px 40px;
    font-family: inherit;
    font-size: 28px;
    font-weight: bold;
    border-radius: 12px;
    cursor: pointer;
    box-shadow: 0 8px 0 #aa4400;
    transition: transform 0.1s;
  }
  .play-btn:hover {
    transform: translateY(4px);
    box-shadow: 0 4px 0 #aa4400;
  }
  .play-btn:active {
    transform: translateY(8px);
    box-shadow: none;
  }
  .click-hint {
    position: absolute;
    bottom: 30px;
    left: calc(50% - 170px);
    transform: translateX(-50%);
    color: #fff;
    font-size: 20px;
    opacity: 0.5;
    pointer-events: none;
    animation: pulse 2s infinite;
    display: none;
    z-index: 5;
  }
  @keyframes pulse { 0% { opacity: 0.2; } 50% { opacity: 0.8; } 100% { opacity: 0.2; } }
</style>
</head>
<body>

<div id="game-container">

    <canvas id="gameCanvas"></canvas>
    <div id="hud">
      <div class="hud-box">      <div class="hud-title">Startup Funds</div>
      <div class="hud-value" id="cashDisplay">$0</div>
    </div>
    <div class="hud-box" style="padding: 10px 25px;">
      <div class="hud-title" style="font-size: 12px;">Product Stage</div>
      <div id="stageDisplay" style="font-size: 20px; font-weight: bold; margin-top: 5px;">Prototype</div>
      <div id="stageMultDisplay" style="font-size: 12px; color: #aaa;">Revenue x1</div>
    </div>
    <div class="hud-box" style="padding: 10px 25px;">
      <div class="hud-title" style="font-size: 12px;">Metrics</div>
        <div style="color:#44ff44; font-size: 18px; margin-top:5px;"><span id="subscribersDisplay">0</span> Subscribers</div>
        <div style="color:#aaa; font-size: 12px; margin-top:5px;">Revenue: $<span id="passiveRateDisplay">0</span>/sec</div>
      </div>
      <div class="hud-box" style="padding: 10px 25px;" id="missionBox">
        <div class="hud-title" style="font-size: 12px;">Current Mission</div>
        <div id="missionName" style="color:#ffcc00; font-size: 16px; margin-top:5px; font-weight:bold;">Mission Name</div>
        <div id="missionDesc" style="color:#aaa; font-size: 12px; margin-top:5px;">Mission Desc</div>
        <button id="claimMissionBtn" style="display:none; margin-top:10px; background:#44ff44; color:#111; border:none; padding:8px; border-radius:4px; cursor:pointer; font-family:inherit; font-weight:bold; box-shadow: 0 4px 0 #00aa00;">Claim Reward</button>
      </div>
      <div class="hud-box">
        <div class="hud-title">Unicorn Progress</div>
        <div style="width:100%; background:#111; height:10px; border-radius:5px; margin-top:5px; overflow:hidden;">
          <div id="unicornBar" style="width:0%; height:100%; background:linear-gradient(90deg, #ff00ff, #00ffff); transition: width 0.3s;"></div>
        </div>
        <div style="font-size:12px; color:#aaa; margin-top:5px; text-align:right;" id="unicornText">0%</div>
      </div>
    </div>
    <div id="marketing-container"></div>
    <button id="restartBtn" style="position: absolute; bottom: 20px; left: 20px; z-index: 100; background:#ff4444; color:#fff; border:none; padding:10px 15px; border-radius:4px; cursor:pointer; font-family:inherit; font-weight:bold; box-shadow: 0 4px 0 #cc0000; display:none; pointer-events:auto;">Restart</button>
    
    <div id="shop-panel">
      <div id="shop-header">UPGRADES</div>
      <div id="shop-items"></div>
    </div>
  </div>

  <div id="screens">
    <div class="title">STARTUP<br>SIMULATOR</div>
    <div class="subtitle">From Bedroom to Tech Empire</div>
    <button class="play-btn" id="startBtn">START CODING</button>
  </div>
</div>

<script>
// === SECTION: IMPORTS ===
// No imports for 2D canvas game

// === SECTION: GAME_CONFIG ===
// === GAME_CONFIG (edited by Pixelfork tools) ===
const GAME_CONFIG = {
  baseSubscribers: 1,
  costMultiplier: 1.15,
  stages: [
    { name: 'Prototype', req: 0, mult: 1, color: '#aaa' },
    { name: 'MVP', req: 100, mult: 2, color: '#44aaff' },
    { name: 'Launch', req: 1000, mult: 5, color: '#ffcc00' },
    { name: 'Production', req: 10000, mult: 10, color: '#44ff44' }
  ],
  marketing: [
    { id: 'x', name: 'Post on X', req: 0, mult: 0.1, base: 1, color: '#00aaff', cd: 15 },
    { id: 'reddit', name: 'Post on Reddit', req: 10, mult: 0.2, base: 5, color: '#ff4500', cd: 30 },
    { id: 'linkedin', name: 'Post on LinkedIn', req: 50, mult: 0.5, base: 25, color: '#0077b5', cd: 60 },
    { id: 'producthunt', name: 'Product Hunt Launch', req: 200, mult: 1.0, base: 100, color: '#da552f', cd: 120 }
  ],
  items: [
    { id: 'notion', name: 'Notion Workspace', type: 'passive', value: 1, cost: 15, desc: '+1 Subscriber' },
    { id: 'github', name: 'GitHub Copilot', type: 'passive', value: 2, cost: 50, desc: '+2 Subscribers' },
    { id: 'claude', name: 'Claude Pro', type: 'passive', value: 5, cost: 100, desc: '+5 Subscribers' },
    { id: 'macbook', name: 'Macbook Pro', type: 'passive', value: 10, cost: 250, desc: '+10 Subscribers' },
    { id: 'vercel', name: 'Vercel Pro', type: 'passive', value: 15, cost: 600, desc: '+15 Subscribers' },
    { id: 'aws_micro', name: 'AWS Micro', type: 'passive', value: 25, cost: 1200, desc: '+25 Subscribers' },
    { id: 'stripe', name: 'Stripe Atlas', type: 'passive', value: 50, cost: 3000, desc: '+50 Subscribers' },
    { id: 'aws_dedi', name: 'AWS Servers', type: 'passive', value: 150, cost: 8000, desc: '+150 Subscribers' },
    { id: 'cloud_cluster', name: 'Cloud Cluster', type: 'passive', value: 500, cost: 25000, desc: '+500 Subscribers' },
    { id: 'ai_datacenter', name: 'AI Data Center', type: 'passive', value: 2000, cost: 100000, desc: '+2000 Subscribers' }
  ],
  missions: [
    { id: 'm1', name: 'Traction', desc: 'Reach 100 Subscribers', type: 'subs', req: 100, rewardType: 'cash', rewardValue: 5000 },
    { id: 'm2', name: 'Technical Leader', desc: 'Reach 1,000 Subscribers', type: 'subs', req: 1000, rewardType: 'cofounder', rewardId: 'cto' },
    { id: 'm3', name: 'Marketing Guru', desc: 'Reach 10,000 Subscribers', type: 'subs', req: 10000, rewardType: 'cofounder', rewardId: 'cmo' },
    { id: 'm4', name: 'Operations Chief', desc: 'Earn $100,000 Total Cash', type: 'totalCash', req: 100000, rewardType: 'cofounder', rewardId: 'coo' }
  ],
  cofounders: {
    cto: { name: 'CTO', title: 'Chief Tech Officer', mult: 2, color: '#00ffff' },
    cmo: { name: 'CMO', title: 'Chief Marketing Officer', mult: 2, color: '#ff00ff' },
    coo: { name: 'COO', title: 'Chief Operating Officer', mult: 3, color: '#ffff00' }
  }
};

// === SECTION: CONSTANTS ===
const UNICORN_GOAL = 1000000000;
const COLORS = {
  wallTop: '#3a3a52',
  wallBottom: '#2d2d42',
  floor: '#1e1e2d',
  deskTop: '#8c5c38',
  deskLeg: '#4a2f1b',
  monitor: '#1a1a1a',
  screenOff: '#0f1712',
  screenOn: '#1a3a22',
  skin: '#ffccaa',
  hair: '#4a3018',
  shirt: '#d44444',
  chair: '#222'
};
let displayWidth = window.innerWidth;
let displayHeight = window.innerHeight;
let dpr = window.devicePixelRatio || 1;

// === SECTION: STATE ===
let state = {
  gamePhase: 'menu', // 'menu', 'playing'
  cash: 0,
  totalCash: 0,
  bonusSubscribers: 0,
  passiveRate: 0,
  subscribers: 0,
  inventory: {},
  particles: [],
  typingTimer: 0,
  passiveAccumulator: 0,
  timeSinceUIUpdate: 0,
  saveTimer: 0,
  marketingCooldowns: {},
  claimedMissions: [],
  cofounders: []
};

// === SECTION: ASSETS ===
// Fonts handled via CSS. Canvas drawing uses procedual shapes.

// === SECTION: INPUT ===
const input = {
  clicked: false,
  pointer: { x: 0, y: 0 }
};

// === SECTION: SETUP ===
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playChaChing() {
  if(audioCtx.state === 'suspended') audioCtx.resume();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'sine';
  osc.frequency.setValueAtTime(1200, audioCtx.currentTime);
  osc.frequency.exponentialRampToValueAtTime(2000, audioCtx.currentTime + 0.1);
  gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
  osc.start();
  osc.stop(audioCtx.currentTime + 0.5);
}

function resize() {
  displayWidth = window.innerWidth;
  displayHeight = window.innerHeight;
  canvas.style.width = displayWidth + 'px';
  canvas.style.height = displayHeight + 'px';
  canvas.width = Math.floor(displayWidth * dpr);
  canvas.height = Math.floor(displayHeight * dpr);
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.scale(dpr, dpr);
}

// === SECTION: ENTITIES ===
function spawnTextParticle(x, y, text, color) {
  state.particles.push({
    x: x + (Math.random() * 40 - 20),
    y: y + (Math.random() * 20 - 10),
    vx: (Math.random() - 0.5) * 30,
    vy: -100 - Math.random() * 50,
    text: text,
    color: color,
    life: 1.0,
    maxLife: 1.0
  });
}

function getWorkspaceCenter() {
  // Center of the playable area (offset by shop width when playing)
  const shopWidth = state.gamePhase === 'playing' ? 340 : 0;
  return {
    x: (displayWidth - shopWidth) / 2,
    y: displayHeight / 2 + 50
  };
}

// === SECTION: PHYSICS ===
function updatePhysics(dt) {
  for (let i = state.particles.length - 1; i >= 0; i--) {
    let p = state.particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) {
      state.particles.splice(i, 1);
    }
  }
}

// === SECTION: GAME_LOGIC ===
function getCurrentStage() {
  let current = GAME_CONFIG.stages[0];
  for (let s of GAME_CONFIG.stages) {
    if (state.subscribers >= s.req) current = s;
  }
  return current;
}

function getItemCost(item) {
  const count = state.inventory[item.id] || 0;
  return Math.floor(item.cost * Math.pow(GAME_CONFIG.costMultiplier, count));
}

function recalculateRates() {
  let newSubs = GAME_CONFIG.baseSubscribers + state.bonusSubscribers;
  
  GAME_CONFIG.items.forEach(item => {
    const count = state.inventory[item.id] || 0;
    if (item.type === 'passive') newSubs += item.value * count;
  });
  
  state.subscribers = newSubs;
  
  const stage = getCurrentStage();
  let baseRate = newSubs * stage.mult;
  
  let cofounderMult = 1;
  state.cofounders.forEach(id => {
    if (GAME_CONFIG.cofounders[id]) cofounderMult *= GAME_CONFIG.cofounders[id].mult;
  });
  
  state.passiveRate = baseRate * cofounderMult;
}

function saveGame() {
  const data = {
    cash: state.cash,
    totalCash: state.totalCash,
    inventory: state.inventory,
    bonusSubscribers: state.bonusSubscribers,
    claimedMissions: state.claimedMissions,
    cofounders: state.cofounders
  };
  localStorage.setItem('startupSimSave', JSON.stringify(data));
}

function loadGame() {
  const saved = localStorage.getItem('startupSimSave');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      state.cash = data.cash || 0;
      state.totalCash = data.totalCash || 0;
      state.inventory = data.inventory || {};
      state.bonusSubscribers = data.bonusSubscribers || 0;
      state.claimedMissions = data.claimedMissions || [];
      state.cofounders = data.cofounders || [];
    } catch(e) {}
  }
}

function wipeSave() {
  localStorage.removeItem('startupSimSave');
  window.location.reload();
}

function claimMission(mId) {
  const m = GAME_CONFIG.missions.find(x => x.id === mId);
  if (!m || state.claimedMissions.includes(mId)) return;
  
  if (m.rewardType === 'cash') {
    state.cash += m.rewardValue;
    state.totalCash += m.rewardValue;
  } else if (m.rewardType === 'cofounder') {
    if (!state.cofounders.includes(m.rewardId)) state.cofounders.push(m.rewardId);
  }
  state.claimedMissions.push(mId);
  playChaChing();
  recalculateRates();
  forceUIUpdate();
  saveGame();
  
  const center = getWorkspaceCenter();
  spawnTextParticle(center.x, center.y - 150, m.rewardType === 'cash' ? `+$${m.rewardValue}` : `${m.rewardId.toUpperCase()} Joined!`, '#44ff44');
}

function buyItem(itemId) {
  const item = GAME_CONFIG.items.find(i => i.id === itemId);
  if (!item) return;
  
  const cost = getItemCost(item);
  if (state.cash >= cost) {
    state.cash -= cost;
    state.inventory[item.id] = (state.inventory[item.id] || 0) + 1;
    recalculateRates();
    forceUIUpdate();
    saveGame();
  }
}

function doMarketing(mId) {
  const m = GAME_CONFIG.marketing.find(x => x.id === mId);
  if (!m) return;
  
  if ((state.marketingCooldowns[mId] || 0) <= 0 && state.gamePhase === 'playing' && state.subscribers >= m.req) {
    const gained = Math.max(m.base, Math.floor(state.subscribers * m.mult));
    state.bonusSubscribers += gained;
    state.marketingCooldowns[mId] = m.cd;
    recalculateRates();
    forceUIUpdate();
    saveGame();
    
    const center = getWorkspaceCenter();
    spawnTextParticle(center.x, center.y - 120, `+${gained} Subs!`, m.color);
  }
}

function updateGameLogic(dt) {
  // Handle passive income
  if (state.passiveRate > 0) {
    state.passiveAccumulator += state.passiveRate * dt;
    if (state.passiveAccumulator >= 1) {
      const earned = Math.floor(state.passiveAccumulator);
      state.cash += earned;
      state.totalCash += earned;
      state.passiveAccumulator -= earned;
      
      // Visual indicator occasionally
      if (Math.random() < 0.1) {
        const center = getWorkspaceCenter();
        spawnTextParticle(center.x, center.y - 100, `+$${earned}`, '#aaa');
      }
    }
  }

  // Handle manual clicks
  if (input.clicked) {
    state.typingTimer = 0.15; // 150ms typing animation
    input.clicked = false;
  }
  
  if (state.typingTimer > 0) {
    state.typingTimer -= dt;
  }
  GAME_CONFIG.marketing.forEach(m => {
    if (state.marketingCooldowns[m.id] > 0) {
      state.marketingCooldowns[m.id] -= dt;
    }
  });
  
  state.saveTimer += dt;
  if (state.saveTimer >= 5) {
    saveGame();
    state.saveTimer = 0;
  }
}

// === SECTION: RENDERING ===
function drawRect(x, y, w, h, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), Math.floor(w), Math.floor(h));
}

function drawRoom() {
  const cx = getWorkspaceCenter().x;
  const cy = getWorkspaceCenter().y;
  const time = Date.now() / 1000;
  const isTyping = state.typingTimer > 0;
  
  // Background
  drawRect(0, 0, displayWidth, cy - 80, COLORS.wallTop);
  drawRect(0, cy - 80, displayWidth, 80, COLORS.wallBottom);
  drawRect(0, cy, displayWidth, displayHeight - cy, COLORS.floor);
  
  // Subtle floor grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 2;
  for(let i = -10; i < 10; i++) {
    ctx.beginPath();
    ctx.moveTo(cx + i * 100 - 500, cy);
    ctx.lineTo(cx + i * 200 - 1000, displayHeight);
    ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(0, cy + 100); ctx.lineTo(displayWidth, cy + 100); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, cy + 250); ctx.lineTo(displayWidth, cy + 250); ctx.stroke();

  // --- BACKGROUND ITEMS ---
  if (state.inventory.stripe) {
    drawRect(cx - 250, cy - 250, 100, 140, '#222');
    drawRect(cx - 245, cy - 245, 90, 130, '#11aaff');
    drawRect(cx - 230, cy - 200, 60, 60, '#ffcc00'); // Sun/logo
  }

  if (state.inventory.aws_dedi) {
    drawRect(cx - 350, cy - 150, 90, 200, '#111');
    drawRect(cx - 340, cy - 140, 70, 180, '#222');
    for(let i=0; i<5; i++) {
      drawRect(cx - 330, cy - 130 + i*30, 50, 20, '#333');
      if (Math.sin(time * 10 + i) > 0) drawRect(cx - 320, cy - 125 + i*30, 8, 8, '#44ff44');
      if (Math.cos(time * 15 + i) > 0.5) drawRect(cx - 300, cy - 125 + i*30, 8, 8, '#ff4444');
    }
  }
  if (state.inventory.ai_datacenter) {
    drawRect(cx + 300, cy - 200, 120, 250, '#222');
    drawRect(cx + 310, cy - 180, 100, 80, '#111'); // screen
    if (time % 2 < 1) drawRect(cx + 330, cy - 150, 20, 20, '#ff00ff');
    else drawRect(cx + 350, cy - 130, 20, 20, '#00ffff');
    drawRect(cx + 300, cy - 100, 120, 40, '#444'); // deck
    drawRect(cx + 320, cy - 90, 10, 10, '#ff0000'); // joystick
  }

  // --- DESK ---
  // Legs
  drawRect(cx - 180, cy, 20, 120, COLORS.deskLeg);
  drawRect(cx + 160, cy, 20, 120, COLORS.deskLeg);
  // Top
  drawRect(cx - 200, cy - 20, 400, 25, COLORS.deskTop);
  drawRect(cx - 195, cy + 5, 390, 10, '#6b4528'); // desk shadow/edge

  // --- DESK ITEMS (BACK) ---

  if (state.inventory.macbook) {
    drawRect(cx + 50, cy - 130, 100, 70, COLORS.monitor); // bezel
    drawRect(cx + 55, cy - 125, 90, 60, (isTyping || state.subscribers > 0) ? '#112233' : '#050a11'); // screen
    drawRect(cx + 90, cy - 60, 20, 40, '#333'); // stand
    if (isTyping || state.subscribers > 0) {
      if (state.inventory.notion) {
        drawRect(cx + 60, cy - 120, 35, 40, '#fff'); // Notion page
        drawRect(cx + 65, cy - 115, 15, 4, '#333');
      } else {
        drawRect(cx + 65, cy - 110, 40, 4, '#44aaff');
      }
      if (state.inventory.claude) {
        drawRect(cx + 100, cy - 120, 40, 40, '#2a2a2a'); // Claude UI
        drawRect(cx + 105, cy - 115, 10, 10, '#d97757'); // Logo
      } else {
        drawRect(cx + 65, cy - 90, 60, 4, '#44aaff');
      }
    }
  }

  // --- MAIN MONITOR ---
  drawRect(cx - 70, cy - 120, 100, 70, COLORS.monitor); // bezel
  drawRect(cx - 65, cy - 115, 90, 60, (isTyping || state.subscribers > 0) ? COLORS.screenOn : COLORS.screenOff); // screen
  drawRect(cx - 30, cy - 50, 20, 30, '#333'); // stand
  if (isTyping || state.subscribers > 0) {
    if (state.inventory.vercel) {
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.moveTo(cx - 5, cy - 110); ctx.lineTo(cx + 5, cy - 95); ctx.lineTo(cx - 15, cy - 95); ctx.fill();
    }
    // Code lines
    for(let i=0; i<4; i++) {
      drawRect(cx - 55, cy - 105 + i*12, 20 + Math.random()*30, 4, '#44ff44');
      if (state.inventory.github) {
        drawRect(cx - 30 + Math.random()*10, cy - 105 + i*12, 10 + Math.random()*20, 4, 'rgba(150,150,150,0.5)');
      }
    }
  }

  // --- CHAIR & BOY ---
  const idleBounce = Math.sin(time * 3) * 2;
  const boyY = cy - 20 + (isTyping ? 0 : idleBounce);
  
  // Chair
  if (state.inventory.aws_micro) {
    drawRect(cx - 45, cy + 30, 50, 10, '#555'); // seat base
    drawRect(cx - 20, cy + 40, 10, 50, '#111'); // piston
    drawRect(cx - 40, cy + 80, 50, 10, '#333'); // wheels base
    drawRect(cx - 45, cy - 40, 15, 80, '#444'); // backrest
  } else {
    drawRect(cx - 35, cy + 30, 40, 10, COLORS.chair); // simple stool
    drawRect(cx - 25, cy + 40, 20, 60, '#111'); // stool legs
  }

  // Boy Body
  drawRect(cx - 30, boyY - 30, 40, 60, COLORS.shirt);
  // Head
  drawRect(cx - 25, boyY - 70, 30, 35, COLORS.skin);
  // Hair
  drawRect(cx - 30, boyY - 75, 40, 15, COLORS.hair);
  drawRect(cx + 5, boyY - 60, 10, 15, COLORS.hair);
  // Glasses/Eyes
  drawRect(cx - 5, boyY - 55, 12, 8, '#222'); 
  drawRect(cx - 3, boyY - 53, 4, 4, '#fff');

  // Arms
  if (isTyping) {
    // Reaching forward
    drawRect(cx - 15, boyY - 20, 45, 12, COLORS.shirt);
    drawRect(cx + 30, boyY - 20, 12, 12, COLORS.skin);
  } else {
    // Resting down
    drawRect(cx - 10, boyY - 20, 12, 40, COLORS.shirt);
    drawRect(cx - 10, boyY + 20, 12, 12, COLORS.skin);
  }

  // --- DESK ITEMS (FRONT) ---
  // Standard Keyboard
  drawRect(cx - 35, cy - 10, 60, 12, '#333');
  ctx.fillStyle = isTyping ? '#555' : '#444';
  ctx.fillRect(cx - 30, cy - 8, 50, 3);
  ctx.fillRect(cx - 30, cy - 4, 50, 3);

  // --- FLOOR ITEMS (FRONT) ---
  if (state.inventory.cloud_cluster) {
    const catY = cy + 60 + Math.sin(time * 2) * 1; // breathing
    drawRect(cx + 150, catY, 40, 25, '#e67e22'); // body
    drawRect(cx + 180, catY + 5, 20, 20, '#e67e22'); // head
    drawRect(cx + 185, catY, 5, 8, '#d35400'); // ear
    drawRect(cx + 195, catY, 5, 8, '#d35400'); // ear
  }
}

function render() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  
  if (state.gamePhase === 'playing') {
    drawRoom();
    
    // Particles
    state.particles.forEach(p => {
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = p.color;
      ctx.font = "20px 'PeaBerry Mono', monospace";
      ctx.fillText(p.text, p.x, p.y);
    });
    ctx.globalAlpha = 1.0;
  }
}

// === SECTION: UI ===
const els = {
  cash: document.getElementById('cashDisplay'),
  stageDisplay: document.getElementById('stageDisplay'),
  stageMultDisplay: document.getElementById('stageMultDisplay'),  missionBox: document.getElementById('missionBox'),
  missionName: document.getElementById('missionName'),
  missionDesc: document.getElementById('missionDesc'),
  claimMissionBtn: document.getElementById('claimMissionBtn'),
  subscribers: document.getElementById('subscribersDisplay'),
  passiveRate: document.getElementById('passiveRateDisplay'),
  unicornBar: document.getElementById('unicornBar'),
  unicornText: document.getElementById('unicornText'),
  shopItems: document.getElementById('shop-items'),
  marketingContainer: document.getElementById('marketing-container'),
  hud: document.getElementById('hud'),
  shopPanel: document.getElementById('shop-panel'),
  screens: document.getElementById('screens')
};

function initUI() {
  els.shopItems.innerHTML = '';
  GAME_CONFIG.items.forEach(item => {
    const btn = document.createElement('button');
    btn.className = 'shop-btn';
    btn.id = 'btn-' + item.id;
    btn.onclick = () => buyItem(item.id);
    
    btn.innerHTML = `
      <div class="item-header">
        <span class="item-name">${item.name}</span>
        <span class="item-count" id="count-${item.id}">0</span>
      </div>
      <div class="item-desc">${item.desc}</div>
      <div class="item-cost">
        Cost: $<span class="cost-val" id="cost-${item.id}">0</span>
      </div>
    `;
    els.shopItems.appendChild(btn);
  });
  els.marketingContainer.innerHTML = '';
  GAME_CONFIG.marketing.forEach(m => {
    const btn = document.createElement('button');
    btn.id = 'mkt-' + m.id;
    btn.style.cssText = `flex: 1; max-width: 200px; background:${m.color}; color:white; border:none; padding:12px; border-radius:5px; cursor:pointer; font-family:inherit; font-weight:bold; box-shadow: 0 4px 0 ${m.color}88; transition: transform 0.1s; display:none;`;
    btn.onclick = () => doMarketing(m.id);
    els.marketingContainer.appendChild(btn);
  });
}

function forceUIUpdate() {
  state.timeSinceUIUpdate = 1; // trigger immediate update
}

function updateUI(dt) {
  if (state.gamePhase !== 'playing') return;
  
  state.timeSinceUIUpdate += dt;
  if (state.timeSinceUIUpdate >= 0.1) {
    state.timeSinceUIUpdate = 0;
    
    els.cash.textContent = '$' + Math.floor(state.cash).toLocaleString();
    
    const stage = getCurrentStage();
    els.stageDisplay.textContent = stage.name;
    els.stageDisplay.style.color = stage.color;
    els.stageMultDisplay.textContent = 'Revenue x' + stage.mult;
    
    els.subscribers.textContent = state.subscribers.toLocaleString();
    els.passiveRate.textContent = state.passiveRate.toLocaleString();
    
    const progress = Math.min((state.cash / UNICORN_GOAL) * 100, 100);
    els.unicornBar.style.width = progress + '%';
    els.unicornText.textContent = '$' + Math.floor(state.cash).toLocaleString() + ' / $1,000,000,000';
        const nextMission = GAME_CONFIG.missions.find(m => !state.claimedMissions.includes(m.id));
    if (nextMission) {
      els.missionBox.style.display = 'block';
      els.missionName.textContent = nextMission.name;
      els.missionDesc.textContent = nextMission.desc;
      
      let isComplete = false;
      if (nextMission.type === 'subs' && state.subscribers >= nextMission.req) isComplete = true;
      if (nextMission.type === 'totalCash' && state.totalCash >= nextMission.req) isComplete = true;
      
      if (isComplete) {
        els.claimMissionBtn.style.display = 'block';
        els.claimMissionBtn.onclick = () => claimMission(nextMission.id);
      } else {
        els.claimMissionBtn.style.display = 'none';
      }
    } else {
      els.missionBox.style.display = 'none';
    }

    GAME_CONFIG.marketing.forEach(m => {
      const btn = document.getElementById('mkt-' + m.id);
      if (btn) {
        if (state.subscribers >= m.req) {
          btn.style.display = 'block';
          const cd = state.marketingCooldowns[m.id] || 0;
          if (cd > 0) {
            btn.disabled = true;
            btn.textContent = `${m.name} (${Math.ceil(cd)}s)`;
            btn.style.background = '#555';
            btn.style.boxShadow = '0 4px 0 #222';
          } else {
            btn.disabled = false;
            btn.textContent = m.name;
            btn.style.background = m.color;
            btn.style.boxShadow = `0 4px 0 ${m.color}88`;
          }
        } else {
          btn.style.display = 'none';
        }
      }
    });
    
    GAME_CONFIG.items.forEach(item => {
      const cost = getItemCost(item);
      const count = state.inventory[item.id] || 0;
      const btn = document.getElementById('btn-' + item.id);
      const costEl = document.getElementById('cost-' + item.id);
      const countEl = document.getElementById('count-' + item.id);
      
      if (btn && costEl && countEl) {
        costEl.textContent = cost.toLocaleString();
        countEl.textContent = count;
        
        if (state.cash < cost) {
          btn.disabled = true;
          costEl.classList.add('too-expensive');
        } else {
          btn.disabled = false;
          costEl.classList.remove('too-expensive');
        }
      }
    });
  }
}

function startGame() {
  state.gamePhase = 'playing';
  els.screens.style.display = 'none';
  els.hud.style.display = 'flex';
  els.marketingContainer.style.display = 'flex';
  els.shopPanel.style.display = 'flex';
  document.getElementById('restartBtn').style.display = 'block';
  recalculateRates();
  forceUIUpdate();
}

// === SECTION: GAME_LOOP ===
let lastTime = 0;
function gameLoop(timestamp) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;

  if (state.gamePhase === 'playing') {
    updatePhysics(dt);
    updateGameLogic(dt);
  }
  
  updateUI(dt);
  render();
}

// === SECTION: INIT ===
window.addEventListener('resize', resize);

// Initialize immediately without waiting for fonts to prevent loading hangs
function initGame() {
  resize();
  loadGame();
  initUI();
  
  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('restartBtn').addEventListener('click', wipeSave);
  
  // Handle clicks on canvas
  canvas.addEventListener('mousedown', (e) => {
    if (state.gamePhase === 'playing') {
      input.clicked = true;
      input.pointer.x = e.clientX;
      input.pointer.y = e.clientY;
    }
  });
  
  // Touch support for canvas
  canvas.addEventListener('touchstart', (e) => {
    if (state.gamePhase === 'playing') {
      e.preventDefault();
      input.clicked = true;
      input.pointer.x = e.touches[0].clientX;
      input.pointer.y = e.touches[0].clientY;
    }
  }, { passive: false });
  
  requestAnimationFrame((t) => {
    lastTime = t;
    gameLoop(t);
  });
}

initGame();

</script>
</body>
</html>
