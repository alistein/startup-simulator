<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Startup Simulator</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<div id="game-container">

  <canvas id="gameCanvas"></canvas>

  <div id="hud">
    <div class="hud-box">
      <div class="hud-title">Startup Funds</div>
      <div class="hud-value" id="cashDisplay">$0</div>
    </div>
    <div class="hud-box hud-box-wide">
      <div class="hud-title">Product Stage</div>
      <div id="stageDisplay">Prototype</div>
      <div id="stageMultDisplay">Revenue x1</div>
    </div>
    <div class="hud-box hud-box-wide">
      <div class="hud-title">Metrics</div>
      <div id="subscribersRow"><span id="subscribersDisplay">0</span> Subscribers</div>
      <div id="passiveRateRow">Revenue: $<span id="passiveRateDisplay">0</span>/sec</div>
    </div>
    <div class="hud-box hud-box-wide" id="missionBox">
      <div class="hud-title">Current Mission</div>
      <div id="missionName">Mission Name</div>
      <div id="missionDesc">Mission Desc</div>
      <button id="claimMissionBtn">Claim Reward</button>
    </div>
    <div class="hud-box">
      <div class="hud-title">Unicorn Progress</div>
      <div id="unicornTrack">
        <div id="unicornBar"></div>
      </div>
      <div id="unicornText">0%</div>
    </div>
  </div>

  <div id="marketing-container"></div>

  <button id="restartBtn">Restart</button>

  <div id="shop-panel">
    <div id="shop-header">UPGRADES</div>
    <div id="shop-items"></div>
  </div>

</div>

<div id="screens">
  <div class="title">STARTUP<br>SIMULATOR</div>
  <div class="subtitle">From Bedroom to Tech Empire</div>
  <button class="play-btn" id="startBtn">START CODING</button>
</div>

<script src="js/config.js"></script>
<script src="js/state.js"></script>
<script src="js/audio.js"></script>
<script src="js/canvas.js"></script>
<script src="js/entities.js"></script>
<script src="js/physics.js"></script>
<script src="js/game-logic.js"></script>
<script src="js/rendering.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>

</body>
</html>
